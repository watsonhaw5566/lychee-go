# ========================================================
#  Air 配置 —— Lychee-Go 开发热重载
# ========================================================
#  安装： go install github.com/cosmtrek/air@latest
#  使用： 在项目根目录执行  air
#  效果： 保存任意 .go / .yml 文件后自动重新编译并重启服务器
# ========================================================

root = "."
tmp_dir = "tmp"

[build]
  # 编译命令
  cmd = "go build -o ./tmp/lychee-go ."

  # 编译后执行的二进制
  bin = "./tmp/lychee-go"

  # 完整的启动命令（可传 args）
  full_bin = ""

  # 传递给运行程序的额外参数
  args_bin = []

  # 监听哪些文件变化
  include_ext = ["go", "yml", "yaml", "toml", "json"]

  # 忽略的目录
  exclude_dir = ["tmp", "vendor", "testdata", "node_modules", "logs", "runtime"]

  # 忽略的文件（正则）
  exclude_file = []

  # 忽略正则（如 _test.go）
  exclude_regex = ["_test.go", ".*_test\\.go$"]

  # 忽略文件末尾匹配
  exclude_unchanged = false

  # 跟踪符号链接
  follow_symlink = false

  # 日志（1 是详细，0 是简洁）
  log = "build-errors.log"

  # 触发编译时发送的信号（可选，给已有进程优雅退出的机会）
  send_interrupt = true

  # 发送 SIGTERM 后等待的毫秒
  kill_delay = "0s"

  # 文件变化后延迟多久再编译（秒）——避免快速多次保存触发多次编译
  delay = 1000

  # 是否在每次运行前停止旧进程
  stop_on_error = true

  # 发送到标准输出的内容颜色
  color = true

  # 编译出错时在终端显示
  rerun = false
  rerun_delay = 500

[log]
  # 显示时间
  time = false

[misc]
  # 删除启动时清空 tmp 目录
  clean_on_exit = true

[screen]
  # 编译成功时清屏
  clear_on_rebuild = true
  # 保留滚动缓冲区
  keep_scroll = true
